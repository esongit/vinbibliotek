<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Oppdater profil</title></head>
<body style="font-family:sans-serif;padding:2rem;max-width:500px">
<h2>🍷 Oppdaterer smaksprofil (1–12)</h2>
<div id="status" style="margin-top:1rem;font-size:14px;color:#888">Venter...</div>
<script>
const JSONBIN_ID  = '69ee057eaaba8821973c41c3';
const JSONBIN_KEY = '$2a$10$zuD906ds8ajxjAlYn7GU7O.Jp2DJpBd1Ngsvpjxk0dcoTX1meswF2';
const PROFILE_TS  = Date.now() + 3600000;

// Profile values on VMP 1-12 scale
// white/rose: fylde, friskhet, sodme
// red: fylde, friskhet, garvestoff
const profiles = {
  1:  {fylde:3, friskhet:8, sodme:6},          // Fun Fuel Riesling
  2:  {fylde:5, friskhet:9, sodme:2},          // Seckinger Riesling
  7:  {fylde:6, friskhet:7, sodme:2},          // Neustifter GV
  8:  {fylde:7, friskhet:6, sodme:2},          // Pfaffl Zeisen GV
  9:  {fylde:4, friskhet:8, sodme:2},          // Fontanafredda Solerose
  10: {fylde:4, friskhet:7, garvestoff:6},     // Enzo Bartoli Nebbiolo
  12: {fylde:6, friskhet:6, garvestoff:7},     // F.lli Giacosa Leunin
  13: {fylde:7, friskhet:6, garvestoff:8},     // Malvirà Nudo Nebbiolo
  15: {fylde:4, friskhet:8, garvestoff:5},     // Tedeschi Valpolicella
  17: {fylde:8, friskhet:5, garvestoff:6},     // Fun Fuel Shiraz
  18: {fylde:5, friskhet:5, garvestoff:4},     // Dom. Wachau Glühwein
};

(async()=>{
  const s = document.getElementById('status');
  s.textContent = '⏳ Henter nåværende data fra JSONBin...';
  try{
    const fetchRes = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,
      {headers:{'X-Access-Key':JSONBIN_KEY}});
    if(!fetchRes.ok) throw new Error('Henting feilet: '+fetchRes.status);
    const current = await fetchRes.json();
    const wines = current.record.wines || current.record;
    const order = current.record.order || wines.map(w=>w.id);

    // Apply profiles
    let updated = 0;
    wines.forEach(w=>{
      const p = profiles[w.id];
      if(!p) return;
      if(p.fylde!=null)      w.fylde      = p.fylde;
      if(p.friskhet!=null)   w.friskhet   = p.friskhet;
      if(p.sodme!=null)      w.sodme      = p.sodme;
      if(p.garvestoff!=null) w.garvestoff = p.garvestoff;
      w.profileUpdatedAt = PROFILE_TS;
      updated++;
    });

    s.textContent = `⏳ Lagrer profil for ${updated} viner...`;
    const putRes = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Access-Key':JSONBIN_KEY},
      body:JSON.stringify({wines,order})
    });
    if(!putRes.ok) throw new Error('Lagring feilet: '+putRes.status);
    s.innerHTML = `✅ <strong>Ferdig! Profil oppdatert for ${updated} viner.</strong> Du kan lukke denne fanen.`;
    s.style.color = '#2d6a2d';
  }catch(e){
    s.innerHTML = '❌ Feil: '+e.message;
    s.style.color = '#a32d2d';
  }
})();
</script>
</body></html>
