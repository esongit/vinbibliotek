<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Oppdater priser</title></head>
<body style="font-family:sans-serif;padding:2rem;max-width:500px">
<h2>🍷 Oppdaterer priser i JSONBin...</h2>
<div id="status" style="margin-top:1rem;font-size:14px;color:#888">Venter...</div>
<script>
const JSONBIN_ID  = '69ee057eaaba8821973c41c3';
const JSONBIN_KEY = '$2a$10$zuD906ds8ajxjAlYn7GU7O.Jp2DJpBd1Ngsvpjxk0dcoTX1meswF2';

// priceUpdatedAt = fremtid (vinner over app ved prismerge)
// updatedAt = 1 (taper alltid mot brukerdata i app)
const PRICE_TS = Date.now() + 3600000;
const USER_TS  = 1;

const prices = [
  {id:1,  price:145.10, priceDate:'APR26'},
  {id:2,  price:198.50, priceDate:'APR26'},
  {id:7,  price:270.50, priceDate:'APR26'},
  {id:10, price:249.90, priceDate:'APR26'},
  {id:12, price:209.90, priceDate:'APR26'},
  {id:13, price:314.90, priceDate:'APR26'},
  {id:15, price:189.90, priceDate:'APR26'},
];

(async () => {
  const s = document.getElementById('status');
  s.textContent = '⏳ Henter nåværende data fra JSONBin...';
  try {
    // 1. Fetch current data
    const fetchRes = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {
      headers: { 'X-Access-Key': JSONBIN_KEY }
    });
    if (!fetchRes.ok) throw new Error('Henting feilet: ' + fetchRes.status);
    const current = await fetchRes.json();
    const wines = current.record.wines || current.record;
    const order = current.record.order || wines.map(w=>w.id);

    // 2. Apply price updates — only touch price fields, preserve all user data
    const priceMap = {};
    prices.forEach(p => priceMap[p.id] = p);
    
    const updated = wines.map(w => {
      if (priceMap[w.id]) {
        return {
          ...w,
          price: priceMap[w.id].price,
          priceDate: priceMap[w.id].priceDate,
          priceUpdatedAt: PRICE_TS,
          // updatedAt stays as-is — user data never touched
        };
      }
      return w;
    });

    // 3. Push back
    s.textContent = '⏳ Lagrer oppdaterte priser...';
    const putRes = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Access-Key': JSONBIN_KEY },
      body: JSON.stringify({ wines: updated, order })
    });
    if (!putRes.ok) throw new Error('Lagring feilet: ' + putRes.status);

    s.innerHTML = '✅ <strong>Priser oppdatert!</strong> Brukerdata (notater, stjerner) er urørt. Du kan lukke denne fanen.';
    s.style.color = '#2d6a2d';
  } catch(e) {
    s.innerHTML = '❌ Feil: ' + e.message;
    s.style.color = '#a32d2d';
  }
})();
</script>
</body></html>
