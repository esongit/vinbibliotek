<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🍷 Vinbibliotek</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f4ee;color:#2a2520;min-height:100vh;}
.container{max-width:980px;margin:0 auto;padding:1rem 1rem 4rem;}

/* HEADER */
.lib-header{padding:.6rem 0;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid #e4dfd6;}
.lib-title{font-size:20px;font-weight:600;letter-spacing:-.3px;color:#2a2520;}
.lib-subtitle{font-size:11px;color:#9a8f84;margin-top:1px;}
.sync-status{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;}
.sync-ok{background:#e4f4ec;color:#2d6a2d;}
.sync-wait{background:#fef3dc;color:#996600;}
.sync-off{background:#f0ede8;color:#9a8f84;}
.sync-err{background:#fdecea;color:#a32d2d;}

/* TOOLBAR */
.toolbar{background:#fff;border:1px solid #e4dfd6;border-radius:12px;padding:10px 14px;margin-bottom:12px;display:flex;flex-direction:column;gap:8px;}
.toolbar-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.toolbar-label{font-size:10px;font-weight:600;color:#c0b8b0;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap;min-width:48px;}
.search-input{flex:1;min-width:160px;font-size:13px;padding:7px 14px;border:1px solid #e4dfd6;border-radius:20px;background:#f9f8f6;color:#2a2520;outline:none;}
.search-input::placeholder{color:#c0b8b0;}
.search-input:focus{border-color:#9a8f84;background:#fff;}
.toggle-btn{font-size:11px;padding:5px 13px;border-radius:20px;border:1px solid #e4dfd6;background:#fff;color:#9a8f84;cursor:pointer;transition:all .13s;user-select:none;}
.toggle-btn:hover{background:#f0ede8;color:#5c5248;}
.toggle-btn.active-type-red{background:#8B1A1A;color:#fff;border-color:#8B1A1A;}
.toggle-btn.active-type-white{background:#7a6200;color:#fff;border-color:#7a6200;}
.toggle-btn.active-type-rose{background:#c4506a;color:#fff;border-color:#c4506a;}
.toggle-btn.active-type-other{background:#888;color:#fff;border-color:#888;}
.toggle-btn.active-status{background:#2a2520;color:#fff;border-color:#2a2520;}
.sort-select{font-size:11px;padding:5px 10px;border:1px solid #e4dfd6;border-radius:20px;background:#fff;color:#5c5248;cursor:pointer;outline:none;}
.sort-dir-btn{font-size:14px;padding:4px 10px;border-radius:20px;border:1px solid #e4dfd6;background:#fff;color:#9a8f84;cursor:pointer;line-height:1.4;}
.sort-dir-btn:hover{background:#f0ede8;}
.btn-small{font-size:11px;padding:6px 13px;border-radius:20px;border:1px solid #e4dfd6;background:#fff;color:#5c5248;cursor:pointer;white-space:nowrap;}
.btn-small:hover{background:#f0ede8;}
.btn-primary{background:#8B1A1A;color:#fff;border-color:#8B1A1A;}
.btn-primary:hover{background:#a01f20;}
.btn-backup{background:#e6f0fb;color:#185fa5;border-color:#b5d4f4;}
.btn-prices{background:#e4f4ec;color:#2d6a2d;border-color:#b8d9b8;}
.section-label{font-size:10px;font-weight:600;color:#c0b8b0;letter-spacing:.08em;text-transform:uppercase;margin:1.25rem 0 8px;}

/* ── DESKTOP: editorial list layout ── */
.grid{display:flex;flex-direction:column;gap:2px;}
.wine-type-section{margin-bottom:20px;}

/* WINE CARD — desktop list row */
.wine-card{background:#fff;border:1px solid #e4dfd6;display:grid;grid-template-columns:76px 1fr 90px;align-items:stretch;cursor:pointer;transition:background .12s;overflow:hidden;}
.wine-card:first-child{border-radius:10px 10px 0 0;}
.wine-card:last-child{border-radius:0 0 10px 10px;}
.wine-card:only-child{border-radius:10px;}
.wine-card+.wine-card{border-top:none;}
.wine-card:hover{background:#ebe7df;}
.wine-card.meh{opacity:.45;}
.wine-card.dragging{opacity:.4;outline:2px dashed #c0b8b0;}
.wine-card.drag-over{outline:2px dashed #8B1A1A;}
.drag-handle{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:18px;height:18px;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.08);border-radius:3px;cursor:grab;font-size:12px;color:#c0b8b0;z-index:2;}
.sort-custom .drag-handle{display:flex;}
.sort-custom .wine-card{cursor:grab;}

/* card image area — desktop */
.card-img-area{position:relative;width:76px;height:88px;background:#ffffff;display:flex;align-items:center;justify-content:center;border-right:1px solid #e4dfd6;flex-shrink:0;}
.card-img-area img{max-width:100%;max-height:76px;object-fit:contain;position:relative;z-index:1;}
.card-type-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;}
.card-status-badges{position:absolute;top:6px;right:6px;display:flex;flex-direction:column;gap:3px;align-items:flex-end;}
.type-icon-badge{display:none;}

/* card body — desktop */
.card-body{padding:10px 16px;display:flex;align-items:center;gap:16px;background:#f0ede5;}
.card-body-left{flex:1;}
.card-name{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:2px;color:#2a2520;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.card-sub{font-size:11px;color:#9a8f84;margin-bottom:5px;}
.card-dice-row{display:inline-flex;align-items:center;gap:3px;margin-right:8px;}
.card-footer{display:flex;align-items:center;justify-content:flex-end;gap:4px;flex-direction:column;text-align:right;}
.price-val{font-size:15px;font-weight:500;color:#2a2520;}
.price-date{font-size:9px;color:#c0b8b0;display:block;}

/* card status column */
.card-status-col{padding:0 12px;display:flex;align-items:center;justify-content:center;border-left:1px solid #e4dfd6;background:#f0ede5;}

/* STATUS BADGES */
.status-badge{font-size:9px;padding:2px 7px;border-radius:9px;font-weight:600;white-space:nowrap;}
.badge-har{background:#e8f4e8;color:#2d6a2d;}
.badge-bestill{background:#e6f0fb;color:#185fa5;}
.badge-meh{background:#f0ede8;color:#9a8f84;}

/* PROFILE CIRCLES in card */
.profile-circles{display:flex;gap:6px;align-items:center;}
.profile-circle-wrap{display:flex;flex-direction:row;align-items:center;gap:3px;}
.profile-circle-wrap.empty{visibility:hidden;pointer-events:none;}
.profile-label{font-size:9px;color:#9a8f84;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.profile-label-full{font-size:10px;color:#9a8f84;}

/* ── MOBILE: horizontal card layout ── */
@media(max-width:640px){
  .wine-card{display:flex;grid-template-columns:none;border-radius:10px!important;border-top:1px solid #e4dfd6!important;margin-bottom:0;}
  .wine-card+.wine-card{margin-top:8px;}
  .grid{gap:0;}
  .wine-type-section{margin-bottom:16px;}
  .card-img-area{width:80px;height:90px;flex-shrink:0;border-right:1px solid #f0ede8;border-radius:0;}
  .card-img-area img{max-height:72px;}
  .card-body{flex:1;padding:9px 12px;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-start;gap:0;background:#f0ede5;}
  .card-body-left{width:100%;}
  .card-name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .card-footer{flex-direction:row;justify-content:space-between;align-items:center;width:100%;margin-top:6px;}
  .price-val{font-size:13px;}
  .card-status-col{display:none;}
}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:12px;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border:1px solid #e4dfd6;box-shadow:0 16px 48px rgba(0,0,0,.15);}

/* Desktop popup: two columns */
@media(min-width:641px){
  .modal{display:grid;grid-template-columns:180px 1fr;max-height:85vh;}
  .modal-img-area{grid-row:1/3;width:180px;min-height:300px;height:auto;border-radius:14px 0 0 14px;border-right:1px solid #e4dfd6;flex-direction:column;justify-content:center;padding:20px 14px;background:#fff;}
  .modal-img-area img{max-height:200px;padding:0;cursor:zoom-in;}
  .img-btn-row{position:static;display:flex;gap:5px;margin-top:12px;justify-content:center;}
  .img-btn{font-size:11px;padding:4px 9px;border-radius:4px;border:1px solid #e4dfd6;background:#fff;color:#9a8f84;cursor:pointer;}
  .modal-type-badge{display:none;}
  .modal-body{grid-column:2;padding:1rem 1.1rem .5rem;background:#f0ede5;}
  .modal-actions{grid-column:2;padding:.5rem 1.1rem 1rem;background:#f0ede5;}
}

/* Mobile popup: single column */
@media(max-width:640px){
  .modal{display:block;}
  .modal-img-area{width:100%;height:220px;border-radius:14px 14px 0 0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#ffffff;}
  .modal-img-area img{max-height:200px;padding:8px;cursor:zoom-in;}
  .img-btn-row{position:absolute;bottom:9px;right:9px;}
  .img-btn{font-size:11px;padding:4px 9px;border-radius:20px;border:1px solid rgba(0,0,0,.15);background:rgba(255,255,255,.9);color:#5c5248;cursor:pointer;}
}

.modal-img-area{position:relative;display:flex;align-items:center;justify-content:center;}
.modal-img-area img{object-fit:contain;transition:transform .15s;}
.modal-type-badge{position:absolute;bottom:9px;left:9px;width:32px;height:32px;border-radius:50%;background:#fff;border:1px solid #e4dfd6;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:1rem 1.1rem;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:2px;line-height:1.3;color:#2a2520;}
.modal-meta{font-size:11px;color:#9a8f84;margin-bottom:12px;}
.detail-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:12px;margin-bottom:10px;align-items:center;}
.dl{color:#9a8f84;font-weight:500;}.dv{color:#2a2520;}
.desc-text{font-size:12px;color:#6a5e56;line-height:1.65;margin:8px 0;border-top:1px solid #e4dfd6;padding-top:8px;}
.tasting-label{font-size:10px;color:#9a8f84;margin-bottom:3px;margin-top:8px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
textarea.tasting-note{width:100%;font-size:12px;padding:8px 10px;border-radius:8px;border:1px solid #e4dfd6;color:#2a2520;background:#f9f8f6;resize:vertical;min-height:55px;font-family:inherit;outline:none;}
.stars6-edit{display:flex;gap:4px;margin:5px 0 10px;}
.star6{font-size:22px;cursor:pointer;color:#e4dfd6;line-height:1;transition:color .1s;}
.star6.lit{color:#c8a830;}.star6:hover{color:#c8a830;}
.modal-actions{display:flex;gap:7px;flex-wrap:wrap;padding:0 1.1rem 1.1rem;}
.action-btn{font-size:11px;padding:6px 14px;border-radius:20px;border:1px solid #e4dfd6;background:#fff;color:#5c5248;cursor:pointer;font-family:inherit;}
.action-btn:hover{background:#f0ede8;}
.action-btn.green{background:#e8f4e8;color:#2d6a2d;border-color:#b8d9b8;}
.action-btn.red{background:#fdecea;color:#a32d2d;border-color:#f7c1c1;}
.action-btn.blue{background:#e6f0fb;color:#185fa5;border-color:#b5d4f4;}
.action-btn.amber{background:#fef3dc;color:#996600;border-color:#f0d080;}
.dismiss-warning{background:#fdecea;border:1px solid #f7c1c1;border-radius:8px;padding:8px 10px;font-size:11px;color:#a32d2d;margin-bottom:8px;display:flex;gap:7px;}
.action-btn.dirty{background:#e8f4e8!important;color:#2d6a2d!important;border-color:#b8d9b8!important;font-weight:600;}
.edit-form-section{border-top:1px solid #f0ede8;padding-top:10px;margin-top:6px;}
.edit-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:7px;}
.edit-row input,.edit-row select,.edit-row textarea{flex:1;min-width:100px;font-size:12px;padding:7px 10px;border:1px solid #e4dfd6;border-radius:8px;font-family:inherit;outline:none;background:#fff;color:#2a2520;}
.add-form{background:#f9f8f6;border-radius:10px;border:1px solid #e4dfd6;padding:.9rem 1.1rem;margin-bottom:1.25rem;}
.add-form h3{font-size:13px;font-weight:600;margin-bottom:9px;color:#2a2520;}
.form-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:7px;}
.form-row input,.form-row select,.form-row textarea{flex:1;min-width:100px;font-size:12px;padding:7px 10px;border:1px solid #e4dfd6;border-radius:8px;font-family:inherit;outline:none;background:#fff;color:#2a2520;}
.form-row input::placeholder,.form-row textarea::placeholder{color:#c0b8b0;}
.update-banner{font-size:11px;padding:6px 11px;background:#f0ede8;border-radius:8px;margin-bottom:9px;color:#7a6e66;}
.count-info{font-size:11px;color:#c0b8b0;margin-bottom:6px;}
.empty{text-align:center;padding:2.5rem;color:#c0b8b0;font-size:13px;}
code{background:#f0ede8;padding:1px 4px;border-radius:3px;font-size:10px;color:#7a6e66;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:flex;align-items:center;justify-content:center;cursor:zoom-out;}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:4px;}

/* SEARCH */
.search-wrap{position:relative;flex:1;min-width:160px;display:flex;align-items:center;}
.search-wrap input{width:100%;padding-right:28px;}
.search-clear{position:absolute;right:10px;font-size:14px;color:#c0b8b0;cursor:pointer;display:none;line-height:1;background:none;border:none;padding:0;}
.search-clear:hover{color:#9a8f84;}

/* MEH btn */
.action-btn.meh{background:#f0ede8;color:#9a8f84;border-color:#e4dfd6;}
.action-btn.meh:hover{background:#e8e4dc;}

/* SETUP */
#setup-screen{background:#f7f4ee!important;}

/* ADD FORM search results */
#nw-search-results a,#nw-search-results div{color:#2a2520;}
#nw-prof-preview{color:#2d6a2d;}

/* EDIT inline fields */
.ef-label-style{font-size:10px;font-weight:600;color:#9a8f84;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.ef-input-style{width:100%;background:#fff;border:1px solid #e4dfd6;border-radius:8px;padding:8px 12px;font-size:13px;color:#2a2520;}
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen" style="display:none;position:fixed;inset:0;background:#f5f4f0;z-index:3000;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:#fff;border-radius:16px;border:1px solid #e4dfd6;width:100%;max-width:420px;padding:2rem;box-shadow:0 8px 32px rgba(0,0,0,.1);">
    <div style="font-size:28px;margin-bottom:6px;">🍷</div>
    <div style="font-size:20px;font-weight:600;margin-bottom:4px;">Vinbibliotek</div>
    <div style="font-size:13px;color:#9a8f84;margin-bottom:1.5rem;">Koble til din JSONBin-database.</div>
    <div style="font-size:11px;font-weight:600;color:#9a8f84;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;">JSONBin Bin ID</div>
    <input id="setup-bin-id" placeholder="f.eks. 69ee057eaaba8821973c41c3" style="width:100%;font-size:13px;padding:9px 11px;border:1px solid #e4dfd6;border-radius:8px;margin-bottom:12px;font-family:monospace;outline:none;background:#f9f8f6;color:#2a2520;"/>
    <div style="font-size:11px;font-weight:600;color:#9a8f84;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;">Access Key</div>
    <form autocomplete="on" onsubmit="return false;" style="margin:0;padding:0;"><input type="text" name="username" autocomplete="username" style="display:none;" aria-hidden="true"/><input id="setup-access-key" type="password" placeholder="$2a$10$..." autocomplete="current-password" style="width:100%;font-size:13px;padding:9px 11px;border:1px solid #e4dfd6;border-radius:8px;margin-bottom:6px;font-family:monospace;outline:none;background:#f9f8f6;color:#2a2520;"/></form>
    <div style="font-size:11px;color:#9a8f84;margin-bottom:16px;line-height:1.5;">Finn disse på <a href="https://jsonbin.io" target="_blank" style="color:#185fa5;">jsonbin.io</a> — Bin ID er i URL-en, Access Key under API Keys.</div>
    <div id="setup-error" style="font-size:12px;color:#a32d2d;margin-bottom:10px;min-height:16px;"></div>
    <button id="setup-btn" onclick="saveSetup()" style="width:100%;font-size:14px;font-weight:500;padding:10px;border-radius:20px;border:none;background:#8B1A1A;color:#fff;cursor:pointer;">Lagre og koble til</button>
  </div>
</div>

<div id="app-root">
<div class="container">
  <div class="lib-header">
    <div>
      <div class="lib-title">🍷 Vinbibliotek</div>
      <div class="lib-subtitle">Synkronisert via JSONBin · Offline-støtte</div>
    </div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;">
      <span id="sync-badge" class="sync-status sync-off">⏳ Laster...</span>
      <button class="btn-small btn-prices" id="update-prices-btn" onclick="updatePricesFromVMP()">↻ Oppdater priser</button>
      <button class="btn-small btn-backup" onclick="downloadBackup()">⬇ Backup</button>
      <button class="btn-small" onclick="openSettings()" title="Innstillinger">⚙</button>
      <button class="btn-small btn-primary" onclick="toggleManualForm()">+ Legg til vin</button>
    </div>
  </div>

  <div id="update-banner"></div>

  <div class="toolbar">
    <div class="toolbar-row">
      <span class="toolbar-label">Søk</span>
      <div class="search-wrap">
        <input class="search-input" id="search" placeholder="Navn, drue, smak, mat..."
          oninput="onSearchInput()" onkeydown="onSearchKey(event)" style="flex:1;min-width:0;"/>
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <div class="toolbar-row">
      <span class="toolbar-label">Type</span>
      <button class="toggle-btn" id="tb-red"   onclick="toggleType('red')">🍷 Rød</button>
      <button class="toggle-btn" id="tb-white" onclick="toggleType('white')">🥂 Hvit</button>
      <button class="toggle-btn" id="tb-rose"  onclick="toggleType('rose')">🌸 Rosé</button>
      <button class="toggle-btn" id="tb-other" onclick="toggleType('other')">🫙 Andre</button>
    </div>
    <div class="toolbar-row">
      <span class="toolbar-label">Status</span>
      <button class="toggle-btn" id="tb-alle"    onclick="toggleStatus('alle')">Alle</button>
      <button class="toggle-btn" id="tb-har"     onclick="toggleStatus('har')">Har</button>
      <button class="toggle-btn" id="tb-bestill" onclick="toggleStatus('bestill')">Bestill</button>
      <button class="toggle-btn" id="tb-meh"     onclick="toggleStatus('meh')">Meh</button>
    </div>
    <div class="toolbar-row">
      <span class="toolbar-label">Profil</span>
      <div id="profil-circles-row" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;min-height:22px;">
        <span style="font-size:10px;color:#ccc;font-style:italic;">Vises når profil er satt</span>
      </div>
    </div>
    <div class="toolbar-row">
      <span class="toolbar-label">Sorter</span>
      <select class="sort-select" id="sort-by" onchange="onSortChange()">
        <option value="custom">Egendefinert</option>
        <option value="name">Alfabetisk</option>
        <option value="price">Pris</option>
        <option value="expert">Terningkast</option>
        <option value="rating">Mine stjerner</option>
        <option value="recent">Sist endret</option>
      <option value="fylde">Fylde</option>
      <option value="friskhet">Friskhet</option>
      <option value="sodme">Sødme</option>
      <option value="garvestoff">Garvestoff</option>
      </select>
      <button class="sort-dir-btn" id="sort-dir-btn" onclick="toggleSortDir()" title="Bytt retning">↓</button>
      <button class="toggle-btn" onclick="resetFilters()">✕ Nullstill</button>
    </div>
  </div>

  <div id="add-form-container" style="display:none;"></div>
  <div id="wine-list"></div>
  <div id="modal-container"></div>
  <div id="lightbox-container"></div>
</div>
</div>

<script>
/* ── CONFIG ── */
const LS_KEY     = 'vinbibliotek_wines_v2';
const LS_SETUP   = 'vinbibliotek_setup_v1';
const LS_ORDER   = 'vinbibliotek_order_v1'; // custom sort order
const VMP_IMG    = 'https://bilder.vinmonopolet.no/cache/300x300-0/';
const VMP_PROXY  = 'https://vinmonopol-proxy.esandal.workers.dev/';
const VIV_IMG    = 'https://images.vivino.com/thumbs/';

function getConfig(){try{return JSON.parse(localStorage.getItem(LS_SETUP))||{};}catch(e){return {};}}
function getBinUrl(){const id=getConfig().binId;return id?`https://api.jsonbin.io/v3/b/${id}`:null;}
function getAccessKey(){return getConfig().accessKey||null;}
function isConfigured(){const c=getConfig();return !!(c.binId&&c.accessKey);}

/* ── STATE ── */
let wines=[];
let customOrder=[]; // array of wine ids in custom order
let activeTypes=new Set();
let activeStatuses=new Set(['alle']); // default: show all (except meh)
let sortBy='custom';
let sortAsc=false; // false = descending for most fields
let showManual=false;
let selectedId=null;
let editRating=0;
let isSyncing=false;
let dragSrcId=null;
let isDirty=false;

/* ── SETUP ── */

async function saveSetup(){

  const err=document.getElementById('setup-error');
  if(!binId||!accessKey){err.textContent='Begge feltene er påkrevd.';return;}

/* ── SYNC ── */
function setSyncBadge(s,t){const el=document.getElementById('sync-badge');if(!el)return;el.className='sync-status sync-'+s;el.textContent=t;}
function loadLocal(){
  try{
    const r=localStorage.getItem(LS_KEY);wines=r?JSON.parse(r):[];
    const o=localStorage.getItem(LS_ORDER);customOrder=o?JSON.parse(o):[];
  }catch(e){wines=[];customOrder=[];}
}
function saveLocal(){
  try{localStorage.setItem(LS_KEY,JSON.stringify(wines));localStorage.setItem(LS_ORDER,JSON.stringify(customOrder));}catch(e){}
}
async function fetchCloud(){
  const url=getBinUrl(),key=getAccessKey();
  if(!url||!key)throw new Error('Ikke konfigurert');
  const res=await fetch(url+'/latest',{headers:{'X-Access-Key':key}});
  if(!res.ok)throw new Error('HTTP '+res.status);
  const data=await res.json();
  // support both {wines,order} and plain array
  if(data.record&&data.record.wines){customOrder=data.record.order||[];return data.record.wines;}
  return Array.isArray(data.record)?data.record:[];
}
async function pushCloud(){
  const url=getBinUrl(),key=getAccessKey();
  if(!url||!key)throw new Error('Ikke konfigurert');
  const payload={wines,order:customOrder};
  const res=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json','X-Access-Key':key},body:JSON.stringify(payload)});
  if(!res.ok)throw new Error('HTTP '+res.status);
}
function mergeWines(local,cloud){
  // Two independent timestamps:
  // updatedAt      = user data (note, rating, status, type, image)
  // priceUpdatedAt = price fields (price, priceDate)
  // Each field group: newest timestamp wins — they never interfere
  const map={};
  cloud.forEach(w=>map[w.id]={...w});
  local.forEach(w=>{
    if(!map[w.id]){map[w.id]={...w};return;}
    const c=map[w.id];
    // merge user data fields
    if((w.updatedAt||0)>=(c.updatedAt||0)){
      c.note=w.note; c.rating=w.rating; c.status=w.status;
      c.type=w.type; c.localImg=w.localImg; c.updatedAt=w.updatedAt;
    }
    // merge price fields
    if((w.priceUpdatedAt||0)>=(c.priceUpdatedAt||0)){
      c.price=w.price; c.priceDate=w.priceDate; c.priceUpdatedAt=w.priceUpdatedAt;
    }
  });
  return Object.values(map).sort((a,b)=>a.id-b.id);
}
async function syncWithCloud(){
  if(isSyncing)return;isSyncing=true;setSyncBadge('wait','⟳ Syncer...');
  try{
    const cloudWines=await fetchCloud();
    if(wines.length===0&&cloudWines.length>0){wines=cloudWines;ensureOrder();saveLocal();render();setSyncBadge('ok','✓ Synkronisert');isSyncing=false;return;}
    const merged=mergeWines(wines,cloudWines);
    const changed=JSON.stringify({wines:merged,order:customOrder})!==JSON.stringify({wines:cloudWines,order:customOrder});
    if(changed){wines=merged;ensureOrder();await pushCloud();}
    else wines=merged;
    saveLocal();render();setSyncBadge('ok','✓ Synkronisert');
  }catch(e){setSyncBadge('err','⚠ Offline');}
  isSyncing=false;
}
async function saveWine(wine){
  wine.updatedAt=Date.now();
  // Note: priceUpdatedAt is NOT touched here — only set by price update scripts
  const idx=wines.findIndex(w=>w.id===wine.id);
  if(idx>=0)wines[idx]=wine;else{wines.push(wine);customOrder.push(wine.id);}
  saveLocal();render();
  if(!navigator.onLine){setSyncBadge('wait','⏳ Venter på nett');return;}
  setSyncBadge('wait','⟳ Synker...');
  try{
    // Fetch cloud first, merge with local, then push — protects against stale-state overwrite
    let cloudWines;
    try{
      cloudWines=await fetchCloud();
    }catch(fetchErr){
      // If fetch fails, fall back to plain push — better to save local than lose data
      await pushCloud();
      setSyncBadge('ok','✓ Synkronisert');
      return;
    }
    const merged=mergeWines(wines,cloudWines);
    wines=merged;
    ensureOrder();
    saveLocal();
    await pushCloud();
    render();
    setSyncBadge('ok','✓ Synkronisert');
  }catch(e){
    setSyncBadge('err','⚠ Offline');
  }
}
window.addEventListener('online',()=>syncWithCloud());
window.addEventListener('offline',()=>setSyncBadge('wait','⏳ Offline'));

/* ── CUSTOM ORDER ── */
function ensureOrder(){
  // add any missing ids, remove deleted
  const ids=wines.map(w=>w.id);
  customOrder=customOrder.filter(id=>ids.includes(id));
  ids.forEach(id=>{if(!customOrder.includes(id))customOrder.push(id);});
}

  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='vinbibliotek-backup-'+nowLabel()+'.json';a.click();
}

function toggleType(t){activeTypes.has(t)?activeTypes.delete(t):activeTypes.add(t);updateToolbar();render();}
function toggleStatus(s){
  // Alle and Meh are exclusive — selecting either clears all others
  if(s==='alle'||s==='meh'){
    activeStatuses.clear();
    activeStatuses.add(s);
  } else {
    // har/bestill: remove alle and meh if present
    activeStatuses.delete('alle');
    activeStatuses.delete('meh');
    if(activeStatuses.has(s)) activeStatuses.delete(s);
    else activeStatuses.add(s);
    // if nothing left, default back to alle
    if(activeStatuses.size===0) activeStatuses.add('alle');
  }
  updateToolbar();render();
}
function resetFilters(){activeTypes.clear();activeStatuses.clear();activeStatuses.add('alle');document.getElementById('sort-by').value='custom';sortBy='custom';sortAsc=false;document.getElementById('sort-dir-btn').textContent='↓';updateToolbar();render();}

  ['red','white','rose','other'].forEach(t=>{const b=document.getElementById('tb-'+t);b.className='toggle-btn'+(activeTypes.has(t)?' active-type-'+t:'');});
  ['alle','har','bestill','meh'].forEach(s=>{const b=document.getElementById('tb-'+s);if(b)b.className='toggle-btn'+(activeStatuses.has(s)?' active-status':'');});

/* ── STATUS LOGIC ── */
// Statuses: null/undefined = no status, 'har', 'bestill', 'meh'
// A wine with no status shows under 'alle' (all except meh)
// 'meh' wines only show when meh filter active
function effectiveStatus(w){
  const s=w.status;
  if(s==='boring'||s==='dismissed') return 'meh';
  if(s==='pending'||s==='all') return null;
  if(s==='har'||s==='bestill'||s==='meh') return s;
  return null;
}
function hasTasted(w){return !!(w.rating||(w.note&&w.note.trim()));}
function wineMatchesFilter(w){
  const st=effectiveStatus(w);
  if(activeStatuses.has('alle')) return st!=='meh';
  if(activeStatuses.has('meh'))  return st==='meh';
  let ok=false;
  if(activeStatuses.has('har'))     ok=ok||(st==='har');
  if(activeStatuses.has('bestill')) ok=ok||(st==='bestill');
  return ok;
}

function getImgSrc(w){
  if(w.localImg)return w.localImg; // base64 uploaded image
  if(w.vmpId)return VMP_IMG+w.vmpId+'-1.jpg';
  if(w.vivinoHash)return VIV_IMG+w.vivinoHash+'_pb_x600.png';
  return null;
}
function imgAreaHTML(w,height,clickable=false){
  const src=getImgSrc(w);
  const iconSz=height>180?60:48;
  const uid=w.id+'-'+height;
  const ph=`<div id="ph-${uid}" style="display:none;align-items:center;justify-content:center;width:100%;height:100%;">${typeIcon(w.type,iconSz)}</div>`;
  const clickAttr=clickable?`onclick="openLightbox('${uid}')" style="max-width:100%;max-height:${height}px;object-fit:contain;padding:12px;cursor:zoom-in;"`:
    `style="max-width:100%;max-height:${height}px;object-fit:contain;padding:7px;"`;
  const showPh=`document.getElementById('ph-${uid}').style.display='flex'`;
  if(!src)return `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;">${typeIcon(w.type,iconSz)}</div>`;
  const vmpSrc=w.vmpId&&!w.localImg&&!w.vivinoHash?VMP_IMG+w.vmpId+'-1.jpg':null;
  const vivSrc=w.vivinoHash&&!w.localImg?VIV_IMG+w.vivinoHash+'_pb_x600.png':null;
  if(w.localImg){
    return `<img id="imgel-${uid}" src="${src}" ${clickAttr} onerror="this.style.display='none';${showPh}" />${ph}`;
  }
  if(vmpSrc&&vivSrc){
    return `<img id="imgel-${uid}" src="${vmpSrc}" ${clickAttr} onerror="this.src='${vivSrc}';this.onerror=function(){this.style.display='none';${showPh}}" />${ph}`;
  }
  return `<img id="imgel-${uid}" src="${src}" ${clickAttr} onerror="this.style.display='none';${showPh}" />${ph}`;
}

/* ── PROFILE CIRCLES ── */
function profileCircleSVG(val, color, sz=18){
  // val is on 1-12 scale from Vinmonopolet
  if(val===null||val===undefined) return '';
  const r=sz/2, cx=r, cy=r, radius=r-1.5;
  const pct = (val-1)/11; // convert 1-12 to 0-1
  if(pct>=1){
    return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="${color}" stroke="#ddd" stroke-width="1"/>
    </svg>`;
  }
  if(pct<=0){
    return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${radius}" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    </svg>`;
  }
  const angle=pct*Math.PI*2;
  const x=cx+radius*Math.sin(angle);
  const y=cy-radius*Math.cos(angle);
  const large=pct>0.5?1:0;
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${radius}" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <path d="M${cx},${cy} L${cx},${cy-radius} A${radius},${radius} 0 ${large},1 ${x},${y} Z" fill="${color}"/>
    <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="#ddd" stroke-width="1"/>
  </svg>`;
}
function profileCirclesHTML(w, small=true){
  const sz=small?14:22;
  // Profile slots depend on wine type:
  // white/rose: FYL, FRI, SØD
  // red:        FYL, FRI, GAR (garvestoff)
  // other:      FYL, FRI
  let profiles;
  if(w.type==='red'){
    profiles=[
      {key:'fylde',      label:'FYL', labelFull:'Fylde',       color:'#8B5CF6'},
      {key:'friskhet',   label:'FRI', labelFull:'Friskhet',    color:'#06B6D4'},
      {key:'garvestoff', label:'GAR', labelFull:'Garvestoff',  color:'#EF4444'},
    ];
  } else if(w.type==='white'||w.type==='rose'){
    profiles=[
      {key:'fylde',    label:'FYL', labelFull:'Fylde',    color:'#8B5CF6'},
      {key:'friskhet', label:'FRI', labelFull:'Friskhet', color:'#06B6D4'},
      {key:'sodme',    label:'SØD', labelFull:'Sødme',    color:'#F59E0B'},
    ];
  } else {
    return ''; // Andre: ingen profilsirkler
  }
  const anyVal=profiles.some(p=>w[p.key]!=null);
  if(!anyVal) return '';
  const circles=profiles.map(p=>{
    const val=w[p.key];
    const isEmpty=val==null;
    const labelStr=small
      ? p.label
      : `${p.labelFull} <span style="color:#bbb;font-size:10px;">${val!=null?val+'/12':''}</span>`;
    return `<div class="profile-circle-wrap${isEmpty?' empty':''}">
      ${isEmpty?`<div style="width:${sz}px;height:${sz}px;"></div>`:profileCircleSVG(val,p.color,sz)}
      <span class="${small?'profile-label':'profile-label-full'}">${labelStr}</span>
    </div>`;
  }).join('');
  return `<div class="profile-circles">${circles}</div>`;
}

/* ── DICE ── */
function diceSVG(n,sz=18){
  const dp={1:[[.5,.5]],2:[[.3,.3],[.7,.7]],3:[[.3,.3],[.5,.5],[.7,.7]],4:[[.3,.3],[.7,.3],[.3,.7],[.7,.7]],5:[[.3,.3],[.7,.3],[.5,.5],[.3,.7],[.7,.7]],6:[[.3,.25],[.7,.25],[.3,.5],[.7,.5],[.3,.75],[.7,.75]]};
  const face=dp[Math.min(6,Math.max(1,Math.round(n)))]||dp[1];
  const r=Math.round(sz*.14),dr=Math.round(sz*.09);
  const dots=face.map(([x,y])=>`<circle cx="${Math.round(x*sz)}" cy="${Math.round(y*sz)}" r="${dr}" fill="#1a1a1a"/>`).join('');
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;"><rect x="1" y="1" width="${sz-2}" height="${sz-2}" rx="${r}" fill="#fff" stroke="#ccc" stroke-width="1.2"/>${dots}</svg>`;
}

/* ── FILTER + SORT ── */
function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  // status filter logic
  // default (nothing selected): show all except boring
  // if 'boring' selected: show boring
  // if 'pending' selected: show pending
  // if 'all' selected: show 'all' status
  // combinations work independently
  let list=wines.filter(w=>{
    const typeOk=activeTypes.size===0||activeTypes.has(w.type);
    const statusOk=wineMatchesFilter(w);
    const searchOk=!q||[w.name,w.grape,w.region,w.taste,w.desc,w.note,w.food].some(s=>s&&s.toLowerCase().includes(q));
    return typeOk&&statusOk&&searchOk;
  });

  if(sortBy==='custom'){
    // sort by customOrder, preserving relative order of other types if filtered
    const orderMap={};customOrder.forEach((id,i)=>orderMap[id]=i);
    list.sort((a,b)=>(orderMap[a.id]??9999)-(orderMap[b.id]??9999));
    return list;
  }

  list.sort((a,b)=>{
    let va,vb;
    if(sortBy==='name'){va=a.name.toLowerCase();vb=b.name.toLowerCase();}
    else if(sortBy==='price'){va=a.price||0;vb=b.price||0;}
    else if(sortBy==='expert'){va=a.expertScore||0;vb=b.expertScore||0;}
    else if(sortBy==='rating'){va=a.rating||0;vb=b.rating||0;}
    else if(sortBy==='recent'){va=a.updatedAt||0;vb=b.updatedAt||0;}
    else if(sortBy==='fylde'){va=a.fylde||0;vb=b.fylde||0;}
    else if(sortBy==='friskhet'){va=a.friskhet||0;vb=b.friskhet||0;}
    else if(sortBy==='sodme'){va=a.sodme||0;vb=b.sodme||0;}
    else if(sortBy==='garvestoff'){va=a.garvestoff||0;vb=b.garvestoff||0;}
    else{va=a.id;vb=b.id;}
    if(va<vb)return sortAsc?-1:1;
    if(va>vb)return sortAsc?1:-1;
    return 0;
  });
  return list;
}

function render(){
  const list=getFiltered();
  const isCustom=sortBy==='custom';
  const groups={red:[],white:[],rose:[],other:[]};
  list.forEach(w=>(groups[w.type]||[]).push(w));
  let html=`<div class="count-info">${list.length} vin${list.length!==1?'er':''} vist</div>`;

  if(!isCustom||activeTypes.size>0){
    // flat list or sorted — no type grouping
    if(list.length){
      html+=`<div class="grid${isCustom?' sort-custom':''}">${list.map(w=>cardHTML(w,isCustom)).join('')}</div>`;
    } else {
      html+='<div class="empty">Ingen viner funnet.</div>';
    }
  } else {
    // grouped by type in custom order
    ['red','white','rose','other'].forEach(t=>{
      if(!groups[t].length)return;
      html+=`<div class="section-label">${typeHeading(t)}</div>`;
      html+=`<div class="grid sort-custom">${groups[t].map(w=>cardHTML(w,true)).join('')}</div>`;
    });
    if(!list.length)html+='<div class="empty">Ingen viner funnet.</div>';
  }
  document.getElementById('wine-list').innerHTML=html;
  if(isCustom)initDrag();
}

function typeStripeColor(type){
  const map={red:'#8B1A1A',white:'#b8960c',rose:'#c4506a',other:'#aaa'};
  return map[type]||'#aaa';
}
function typeGlowRgb(type){
  const map={red:'139,26,26',white:'184,150,12',rose:'196,80,106',other:'150,150,150'};
  return map[type]||'150,150,150';
}

function cardHTML(w,draggable=false){
  const st=effectiveStatus(w);
  const harBadge=st==='har'?'<span class="status-badge badge-har">Har</span>':'';
  const bestillBadge=st==='bestill'?'<span class="status-badge badge-bestill">Bestill</span>':'';
  const colBadge=(harBadge||bestillBadge)?harBadge+bestillBadge:'<span style="font-size:10px;color:#c0b8b0">—</span>';
  const diceRow=w.expertScore?`<span class="card-dice-row">${diceSVG(w.expertScore,13)}<span style="font-size:9px;color:#9a8f84;font-weight:500;">${scoreTag(w)}</span></span>`:'';
  const profRow=profileCirclesHTML(w,true);
  const userStars=w.rating?`<span style="display:inline-flex;gap:1px;">${Array.from({length:6},(_,i)=>`<span style="font-size:10px;color:${i<w.rating?'#c8a830':'#e4dfd6'};">★</span>`).join('')}</span>`:'';
  const dragAttr=draggable?`draggable="true" data-id="${w.id}"`:'' ;
  const handle=draggable?`<div class="drag-handle" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);">⠿</div>`:'';

  return `<div class="wine-card${st==='meh'?' meh':''}" ${dragAttr} onclick="openModal(${w.id})" style="position:relative;">

        </div>

        ${w.priceDate?`<span class="price-date">${w.priceDate}</span>`:''}

/* ── DRAG AND DROP (custom sort) ── */
function initDrag(){
  document.querySelectorAll('.wine-card[draggable]').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      dragSrcId=parseInt(card.dataset.id);
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    card.addEventListener('dragend',()=>card.classList.remove('dragging'));
    card.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();card.classList.remove('drag-over');
      const targetId=parseInt(card.dataset.id);
      if(dragSrcId===targetId)return;
      // move dragSrcId to position of targetId in customOrder
      const srcIdx=customOrder.indexOf(dragSrcId);
      const tgtIdx=customOrder.indexOf(targetId);
      if(srcIdx<0||tgtIdx<0)return;
      customOrder.splice(srcIdx,1);
      customOrder.splice(tgtIdx,0,dragSrcId);
      saveLocal();
      if(navigator.onLine)syncWithCloud();
      render();
    });
  });
}

/* ── PHOTO FUNCTIONS ── */
function triggerImgUpload(id){
  document.getElementById('img-upload-'+id)?.click();
}
function handleImgUpload(event,id){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    // resize to max 800px width
    const img=new Image();
    img.onload=async()=>{
      const MAX=800;
      let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*(MAX/w));w=MAX;}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const base64=canvas.toDataURL('image/jpeg',0.85);

      renderModal(wine);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveEdit(wineId){

  const score=fv('ed-score');

  w.expertSource = fv('ed-src') || 'GV';
  const vmpNew=fv('ed-vmpid'); w.vmpId=vmpNew||null;
  const vivRaw=fv('ed-vivino');
  if(vivRaw){const m=vivRaw.match(/thumbs\/([^_]+)/);w.vivinoHash=m?m[1]:vivRaw;}else w.vivinoHash=null;

  w.note   = document.getElementById('modal-note')?.value ?? w.note;

function nowLabel(){
  const d=new Date();
  const months=['JAN','FEB','MAR','APR','MAI','JUN','JUL','AUG','SEP','OKT','NOV','DES'];
  return months[d.getMonth()]+String(d.getFullYear()).slice(2);
}

async function updatePricesFromVMP(){
  const btn=document.getElementById('update-prices-btn');
  if(!btn)return;
  btn.disabled=true;
  btn.textContent='Oppdaterer...';

  // Show status banner
  let banner=document.getElementById('update-banner');
  if(!banner){banner=document.createElement('div');banner.id='update-banner';document.querySelector('.container').insertBefore(banner,document.querySelector('.toolbar'));}
  const setBannerStatus=(msg,color='rgba(255,255,255,.4)')=>{
    banner.innerHTML=`<div style="font-size:11px;padding:8px 14px;background:rgba(255,255,255,.05);border-radius:10px;margin-bottom:10px;color:${color};">${msg}</div>`;
  };

  const total=wines.length;
  let updated=0, notFound=0, vmpFound=0;
  const dateLabel=nowLabel();

  for(let i=0;i<wines.length;i++){
    const w=wines[i];
    setBannerStatus(`⏳ Oppdaterer ${i+1}/${total}: ${w.name}...`);
    try{
      let searchQ=w.vmpId||w.name;
      const url=`https://www.vinmonopolet.no/vmpws/v2/vmp/products/search?fields=FULL&pageSize=1&currentPage=0&q=${encodeURIComponent(searchQ)}`;
      const data=await vmpFetch(url);
      const prod=(data.products||[])[0];
      if(prod&&prod.price?.value){
        const newPrice=prod.price.value;
        // Assign vmpId if missing and we found a match by name
        if(!w.vmpId&&prod.code){w.vmpId=prod.code;vmpFound++;}
        if(newPrice!==w.price) updated++;
        w.price=newPrice;
        w.priceDate=dateLabel;
        w.priceUpdatedAt=Date.now();
      } else {
        notFound++;
      }
    }catch(e){ notFound++; }
    await new Promise(r=>setTimeout(r,300));
  }

  // Push to cloud with fetch-merge-push to avoid overwriting concurrent changes
  setBannerStatus('⏳ Lagrer oppdaterte priser...');
  saveLocal();render();
  if(navigator.onLine){
    try{
      // Fetch cloud first, merge with local, then push
      let cloudWines;
      try{
        cloudWines=await fetchCloud();
        const merged=mergeWines(wines,cloudWines);
        wines=merged;
        ensureOrder();
        saveLocal();
      }catch(fetchErr){
        // Fetch failed — fall back to plain push so we don't lose the prices
      }
      await pushCloud();
      render();
      setBannerStatus(`✅ Ferdig! ${updated} priser endret · ${vmpFound} nye varenummer · ${notFound} ikke funnet`,'#5DCAA5');
    }catch(e){
      setBannerStatus(`⚠ Priser oppdatert lokalt, men skylagring feilet: ${e.message}`,'#EF9F27');
    }
  } else {
    setBannerStatus(`✅ Priser oppdatert lokalt (offline) — ${updated} endret`,'#5DCAA5');
  }

  btn.disabled=false;
  btn.textContent='↻ Oppdater priser';
  setTimeout(()=>{banner.innerHTML='';},8000);
}

async function vmpFetch(url){
  const proxyUrl=`${VMP_PROXY}?url=${encodeURIComponent(url)}`;
  const res=await fetch(proxyUrl);
  if(!res.ok) throw new Error('HTTP '+res.status);
  const text=await res.text();
  if(text.trim().startsWith('<')){
    throw new Error('Fikk HTML — Worker ikke oppdatert ennå');
  }
  return JSON.parse(text);
}

function vmpTypeToLocal(t){
  if(!t) return 'red';
  const tl=t.toLowerCase();
  if(tl.includes('hvit')||tl.includes('white')) return 'white';
  if(tl.includes('ros')) return 'rose';
  return 'red';
}

// Convert VMP facet range "7-8" → midpoint integer (e.g. 7)
function facetToInt(code){
  if(!code) return null;
  const parts=code.split('-').map(Number);
  if(parts.length===2&&!isNaN(parts[0])) return parts[0]; // use lower bound
  const n=parseInt(code);
  return isNaN(n)?null:n;
}

// Parse profile values from facets array for a specific product code
function profileFromFacets(facets, pid){
  const result={fylde:null,friskhet:null,sodme:null,garve:null,food:null};
  if(!facets||!pid) return result;
  const map={
    'Fylde':            'fylde',
    'Friskhet':         'friskhet',
    'Soedme':           'sodme',
    'Tannin(Sulfates)': 'garve',
  };
  facets.forEach(f=>{
    // Profile values
    const key=map[f.code];
    if(key){
      const selected=(f.values||[]).find(v=>v.selected)||(f.values||[])[0];
      if(selected) result[key]=facetToInt(selected.code);
    }
    // Food/mat from isGoodfor facet
    if(f.code==='isGoodfor'){
      result.food=(f.values||[]).map(v=>v.name).join(', ');
    }
  });
  return result;
}

async function selectVmpProduct(pid, searchData){
  const box=document.getElementById('nw-search-results');
  const set=(id,v)=>{const el=document.getElementById(id);if(el&&v!=null&&v!=='')el.value=v;};

  // Fill fields from search data immediately
  set('nw-name',   searchData.name);
  set('nw-grape',  searchData.grape);
  set('nw-region', searchData.region);
  set('nw-vmpid',  pid);
  set('nw-food',   searchData.food);
  if(searchData.price) set('nw-price', Math.round(searchData.price));
  const typeEl=document.getElementById('nw-type');
  if(typeEl) typeEl.value=searchData.type||'red';
  if(box) box.style.display='none';
  const badge=document.getElementById('nw-autofill-badge');
  if(badge) badge.style.display='inline';
  const searchEl=document.getElementById('nw-search');

  const profPreview=document.getElementById('nw-prof-preview');
  if(profPreview){ profPreview.textContent='⏳ Henter detaljer...'; profPreview.style.color='#888'; }

  try{
    // Search by product code — returns facets specific to this product
    const data = await vmpFetch(
      `https://www.vinmonopolet.no/vmpws/v2/vmp/products/search?fields=FULL&pageSize=1&currentPage=0&q=${encodeURIComponent(pid)}`
    );

    // Get product URL for HTML scraping (smak, mat, desc)
    const prod = (data.products||[])[0];
    const prodUrl = prod?.url ? `https://www.vinmonopolet.no${prod.url}` : null;

    // Extract profile from facets
    const prof = profileFromFacets(data.facets||[], pid);

    // Fill food from facets (already parsed)
    const set2=(id,v)=>{const el=document.getElementById(id);if(el&&v&&!el.value)el.value=v.trim();};
    if(prof.food) set2('nw-food', prof.food);

    // Scrape product page HTML for smak and beskrivelse
    if(prodUrl){
      try{
        const pageRes = await fetch(`${VMP_PROXY}?url=${encodeURIComponent(prodUrl)}`);
        if(pageRes.ok){
          const html = await pageRes.text();
          // Confirmed structure: <span>Smak</span><span>VALUE</span>
          const smakM = html.match(/<span>Smak<\/span><span>([^<]+)<\/span>/);
          const luktM = html.match(/<span>Lukt<\/span><span>([^<]+)<\/span>/);
          if(smakM) set2('nw-taste', smakM[1]);
          if(luktM) set2('nw-desc',  luktM[1]);
        }
      }catch(e){ /* HTML scraping failed silently */ }
    }

    window._vmpProfile=prof;

    if(profPreview){
      const type=searchData.type||'red';
      const vals=[
        prof.fylde   !=null?`FYL ${prof.fylde}/12`:'',
        prof.friskhet!=null?`FRI ${prof.friskhet}/12`:'',
        prof.sodme   !=null&&type!=='red'?`SØD ${prof.sodme}/12`:'',
        prof.garve   !=null&&type==='red' ?`GAR ${prof.garve}/12`:'',
      ].filter(Boolean).join(' · ');
      profPreview.textContent=vals?'✓ Profil: '+vals:'(Ingen profilverdier funnet)';
      profPreview.style.color=vals?'#2d6a2d':'#888';
    }
  }catch(e){
    window._vmpProfile={};
    if(profPreview){ profPreview.textContent='⚠ Henting feilet: '+e.message; profPreview.style.color='#996600'; }
  }
}

async function addManualWine(){
  const name=document.getElementById('nw-name').value.trim();if(!name){alert('Navn er påkrevd.');return;}
  const vivRaw=document.getElementById('nw-vivino').value.trim();let vivinoHash=null;
  if(vivRaw){const m=vivRaw.match(/thumbs\/([^_]+)/);vivinoHash=m?m[1]:vivRaw;}
  const score=document.getElementById('nw-score').value;
  const prof=window._vmpProfile||{};
  const newWine={
    id:nextId(),name,
    grape:  document.getElementById('nw-grape').value.trim()||'—',
    region: document.getElementById('nw-region').value.trim()||'—',
    type:   document.getElementById('nw-type').value,
    price:  parseFloat(document.getElementById('nw-price').value)||null,
    priceDate: nowLabel(),
    priceUpdatedAt: Date.now(),
    vmpId:  document.getElementById('nw-vmpid').value.trim()||null,
    vivinoHash,
    status: null,
    taste:  document.getElementById('nw-taste').value.trim()||'—',
    food:   document.getElementById('nw-food').value.trim()||'—',
    expertScore:  score?parseInt(score):null,
    expertSource: document.getElementById('nw-source').value,
    desc:   document.getElementById('nw-desc').value.trim()||'',
    note:'', rating:0, updatedAt:Date.now(),
    // Profile values from VMP if available
    ...(prof.fylde!=null    && {fylde:    prof.fylde}),
    ...(prof.friskhet!=null && {friskhet: prof.friskhet}),
    ...(prof.sodme!=null    && {sodme:    prof.sodme}),
    ...(prof.garve!=null    && {garvestoff: prof.garve}),
  };
  window._vmpProfile=null;
  showManual=false;document.getElementById('add-form-container').style.display='none';document.getElementById('add-form-container').innerHTML='';
  await saveWine(newWine);
}

/* ── BOOT ── */
async function bootApp(){
  loadLocal();
  if(wines.length===0){wines=defaultWines.map(w=>({...w}));ensureOrder();saveLocal();}
  else ensureOrder();
  render();setSyncBadge('wait','⟳ Syncer...');
  if(navigator.onLine)await syncWithCloud();else setSyncBadge('wait','⏳ Offline — bruker lokal kopi');
}
async function init(){
  if(!isConfigured())showSetupScreen();else{hideSetupScreen();await bootApp();}
}
init();
</script>
