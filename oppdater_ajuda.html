<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Oppdater Ajuda Rosé</title></head>
<body style="font-family:sans-serif;padding:2rem;max-width:500px">
<h2>🍷 Oppdaterer Ajuda Chafariz Rosé</h2>
<div id="status" style="margin-top:1rem;font-size:14px;color:#888">Venter...</div>
<script>
const JSONBIN_ID  = '69ee057eaaba8821973c41c3';
const JSONBIN_KEY = '$2a$10$zuD906ds8ajxjAlYn7GU7O.Jp2DJpBd1Ngsvpjxk0dcoTX1meswF2';
const VMP_ID      = '12013801';
const TS          = Date.now() + 3600000;

function log(msg){ document.getElementById('status').innerHTML = msg; }

(async()=>{
  log('⏳ Henter nåværende data fra JSONBin...');
  let wines, order;
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`,
      { headers: { 'X-Access-Key': JSONBIN_KEY } });
    if(!r.ok) throw new Error('JSONBin feilet: ' + r.status);
    const d = await r.json();
    wines = d.record.wines || d.record;
    order = d.record.order || wines.map(w=>w.id);
  } catch(e) { log('❌ ' + e.message); return; }

  log('⏳ Henter bilde fra Vinmonopolet...');
  // Fetch VMP image as blob and convert to base64
  let localImg = null;
  try {
    const imgUrl = `https://bilder.vinmonopolet.no/cache/300x300-0/${VMP_ID}-1.jpg`;
    const imgRes = await fetch(imgUrl);
    if(!imgRes.ok) throw new Error('Bilde ikke funnet: ' + imgRes.status);
    const blob = await imgRes.blob();
    localImg = await new Promise((res, rej) => {
      const reader = new FileReader();
      reader.onload  = () => res(reader.result);
      reader.onerror = rej;
      reader.readAsDataURL(blob);
    });
    // Resize to max 800px
    const img = new Image();
    await new Promise((res, rej) => { img.onload=res; img.onerror=rej; img.src=localImg; });
    const MAX = 800;
    let w = img.width, h = img.height;
    if(w > MAX) { h = Math.round(h*(MAX/w)); w = MAX; }
    const canvas = document.createElement('canvas');
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    localImg = canvas.toDataURL('image/jpeg', 0.85);
    log(`✓ Bilde hentet (${Math.round(localImg.length/1024)}KB)`);
  } catch(e) {
    log(`⚠ Bilde ikke tilgjengelig: ${e.message} — fortsetter uten bilde`);
  }

  // Update wine id:19
  const wine = wines.find(w => w.id === 19);
  if(!wine) { log('❌ Fant ikke vin med id:19'); return; }

  // Update all fields, remove localImg (use VMP image instead via vmpId)
  wine.name         = 'Ajuda Chafariz Rosé';
  wine.region       = 'Alentejano, Portugal';
  wine.grape        = 'Aragonez/Trincadeira';
  wine.type         = 'rose';
  wine.price        = 179;
  wine.priceDate    = 'APR26';
  wine.vmpId        = VMP_ID;
  wine.vivinoHash   = null;
  wine.taste        = 'Røde bær, bringebær, frisk, blomster';
  wine.food         = 'Aperitiff, fisk, lyst kjøtt, sommermat';
  wine.expertScore  = 4;
  wine.expertSource = 'GV';
  wine.desc         = 'Lys laksefarge med røde bær og bringebær på nesen. Frisk og elegant med god friskhet. Tørr og lett — klassisk sommerrosé fra Alentejo.';
  wine.fylde        = 4;
  wine.friskhet     = 8;
  wine.sodme        = 3;
  wine.profileUpdatedAt = TS;
  wine.priceUpdatedAt   = TS;
  wine.updatedAt        = TS;
  // Remove stored base64 image — use vmpId for image instead
  delete wine.localImg;

  log('⏳ Lagrer til JSONBin...');
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Access-Key': JSONBIN_KEY },
      body: JSON.stringify({ wines, order })
    });
    if(!r.ok) throw new Error('Lagring feilet: ' + r.status);
    log('✅ <strong>Ajuda Chafariz Rosé oppdatert!</strong> Bilde hentes nå fra Vinmonopolet. Du kan lukke denne fanen.');
  } catch(e) { log('❌ ' + e.message); }
})();
</script>
</body></html>
